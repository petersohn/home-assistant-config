title: Home
views:
  - path: default_view
    title: default_view
    badges: []
    cards:
      #- type: entity
      #  entity: cover.gate
      - type: heading
        heading: Jelenlét
        icon: mdi:home
        badges:
          - type: entity
            entity: input_select.presence_mode
            tap_action:
              action: more-info
          - type: button
            name: Home
            icon: mdi:home
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.presence_mode
                option: 'home'
          - type: button
            name: Sleep
            icon: mdi:sleep
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.presence_mode
                option: 'sleep'
          - type: button
            name: Away
            icon: mdi:home-export-outline
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.presence_mode
                option: 'away'
      - type: heading
        heading: Kapu
        icon: mdi:gate
        badges:
          - type: entity
            entity: cover.gate
            tap_action:
              action: more-info
          - type: button
            name: Stop
            icon: mdi:gate-alert
            tap_action:
              action: call-service
              service: cover.stop_cover
              service_data:
                entity_id: cover.gate
          - type: button
            name: Nyitás
            icon: mdi:gate-open
            tap_action:
              action: call-service
              service: cover.open_cover
              service_data:
                entity_id: cover.gate
          - type: button
            name: Nyitás gyalogos
            icon: mdi:walk
            tap_action:
              action: call-service
              service: cover.set_cover_position
              service_data:
                entity_id: cover.gate
                position: 40
          - type: button
            name: Zárás
            icon: mdi:gate
            tap_action:
              action: call-service
              service: cover.close_cover
              service_data:
                entity_id: cover.gate
      - type: vertical-stack
        cards:
          - type: heading
            heading: Hőmérséklet
            icon: mdi:thermometer
            badges:
              - type: entity
                entity: sensor.temperature_outside
                icon: mdi:sun-thermometer
                tap_action:
                  action: more-info
              - type: entity
                entity: sensor.temperature_kitchen
                icon: mdi:pot-steam
                tap_action:
                  action: more-info
              - type: entity
                entity: sensor.temperature_living_room_upper
                icon: mdi:sofa
                tap_action:
                  action: more-info
              - type: entity
                entity: sensor.temperature_bedroom_upper
                icon: mdi:bed
                tap_action:
                  action: more-info
          - type: heading
            heading: Eső
            icon: mdi:weather-pouring
            badges:
              - type: entity
                entity: sensor.rain_last_day_rounded
                name: 12h
                icon: mdi:calendar-clock
                state_content:
                  - name
                  - state
                tap_action:
                  action: more-info
                  entity: sensor.rain_last_day
              - type: entity
                entity: sensor.rain_last_hour_rounded
                name: 1h
                icon: mdi:clock-time-one
                state_content:
                  - name
                  - state
                tap_action:
                  action: more-info
                  entity: sensor.rain_last_hour
      - type: vertical-stack
        cards:
          - type: heading
            heading: Klíma mód
            icon: mdi:thermostat-auto
            badges:
              - type: entity
                entity: input_select.climate_mode
                tap_action:
                  action: more-info
              - type: button
                entity: binary_sensor.climate_off
                icon: mdi:thermometer-off
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.climate_mode
                    option: 'off'
              - type: button
                entity: binary_sensor.climate_cool
                icon: mdi:snowflake-thermometer
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.climate_mode
                    option: 'cool'
              - type: button
                entity: binary_sensor.climate_dry
                icon: mdi:water-percent
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.climate_mode
                    option: 'dry'
              - type: button
                entity: binary_sensor.climate_heat
                icon: mdi:sun-thermometer-outline
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.climate_mode
                    option: 'heat'
              - type: button
                entity: binary_sensor.climate_heat_up
                icon: mdi:thermometer-chevron-up
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.climate_mode
                    option: 'heat_up'
              - type: button
                entity: binary_sensor.climate_keep_warm
                icon: mdi:thermometer-lines
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.climate_mode
                    option: 'keep_warm'
          - type: heading
            heading: Klíma csendes
            icon: mdi:fan-chevron-down
            badges:
              - type: button
                entity: binary_sensor.living_room_climate_silence
                icon: mdi:sofa
                tap_action:
                  action: call-service
                  service: script.toggle_silence
                  service_data:
                    entity: climate.daikin_living_room
              - type: button
                entity: binary_sensor.bedroom_climate_silence
                icon: mdi:bed
                tap_action:
                  action: call-service
                  service: script.toggle_silence
                  service_data:
                    entity: climate.daikin_bedroom
          - type: heading
            heading: Klíma
            icon: mdi:thermostat
            badges:
              - type: entity
                entity: input_boolean.wood_heating
                color: state
                tap_action:
                  action: toggle
                double_tap_action:
                  action: more-info
              - type: entity
                entity: climate.daikin_living_room
                color: state
                icon: mdi:sofa
                state_content:
                  - state
                  - temperature
                tap_action:
                  action: more-info
              - type: entity
                entity: climate.daikin_bedroom
                color: state
                icon: mdi:bed
                state_content:
                  - state
                  - temperature
                tap_action:
                  action: more-info
      - type: vertical-stack
        cards:
          - type: heading
            heading: Lejátszás desktop
            icon: mdi:desktop-tower
            badges:
              - type: entity
                entity: switch.desktop_player
                color: state
                tap_action:
                  action: toggle
                double_tap_action:
                  action: more-info
              - type: entity
                entity: input_boolean.desktop_player_pause
                color: state
                tap_action:
                  action: toggle
                double_tap_action:
                  action: more-info
          - type: heading
            heading: Lejátszás laptop
            icon: mdi:laptop
            badges:
              - type: entity
                entity: switch.laptop_player
                color: state
                tap_action:
                  action: toggle
                double_tap_action:
                  action: more-info
              - type: entity
                entity: input_boolean.laptop_player_pause
                color: state
                tap_action:
                  action: toggle
                double_tap_action:
                  action: more-info

