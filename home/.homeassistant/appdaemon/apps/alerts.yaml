camera_detection_alert:
    module: expression
    class: Expression
    dependencies:
        - locker
    expr: >
        (v.input_select.presence_mode == "sleep"
        or
        v.input_select.presence_mode == "away"
        and
        (v.sensor.time >= "22:00" or v.sensor.time <= "07:00"))
        and
        ((ok.binary_sensor.kapu_person_detected and
        v.binary_sensor.kapu_person_detected)
        or
        (ok.binary_sensor.kapu_vehicle_detected and
        v.binary_sensor.kapu_vehicle_detected)
        or
        (ok.binary_sensor.bejaro_person_detected and
        v.binary_sensor.bejaro_person_detected)
        or
        (ok.binary_sensor.bejaro_vehicle_detected and
        v.binary_sensor.bejaro_vehicle_detected))
    target: binary_sensor.camera_detection_alert
    attributes:
        friendly_name: "Kamera riasztás"
        icon: mdi:alarm-bell


availability_alerts:
    module: alert
    class: AlertAggregator
    target: binary_sensor.availability_alert
    trigger_expr: >
      v.input_select.presence_mode != 'sleep' and
      not v['input_boolean.' + name + '_maintenance'] and
      ok['binary_sensor.' + name + '_available'] and
      not v['binary_sensor.' + name + '_available']
    text_expr: a['binary_sensor.' + name + '_available'].friendly_name
    timeout:
        hours: 1
    dependencies:
        - locker
    sources:
        - driveway
        - driveway2
        - living_room_temperature
        - bedroom_temperature
        - dishwasher_sensor
        - gate_reflector
        - attic_lower
        - garage_controller


availability_alerts_critical:
    module: alert
    class: AlertAggregator
    target: binary_sensor.availability_alert_critical
    trigger_expr: >
      not v['input_boolean.' + name + '_maintenance'] and
      ok['binary_sensor.' + name + '_available'] and
      not v['binary_sensor.' + name + '_available']
    text_expr: a['binary_sensor.' + name + '_available'].friendly_name
    timeout:
        minutes: 5
    dependencies:
        - locker
    sources:
        - furnace_temperature
        - well_controller
        - main_controller
        - main_controller2
        - cellar_controller
        - dining_room_window
        - dining_room_window_2
        - living_room_window
        - balcony_controller
        - storage_window_1
        - storage_window_2
        - gate_controller


window_alerts:
    module: alert
    class: AlertAggregator
    target: binary_sensor.window_alert
    trigger_expr: v[name] and v.input_select.presence_mode == 'away'
    text_expr: a[name].friendly_name
    dependencies:
        - locker
    sources:
        - binary_sensor.window_bedroom
        - binary_sensor.window_living_room
        - binary_sensor.window_entrance
        - binary_sensor.window_dining_room_2
        - binary_sensor.window_storage_1
        - binary_sensor.window_storage_2
        - binary_sensor.door_main_entrance
        - binary_sensor.door_attic_hatch
        - binary_sensor.door_furnace_room
        - binary_sensor.door_storage
        - binary_sensor.door_cellar


window_alerts_sleep:
    module: alert
    class: AlertAggregator
    target: binary_sensor.window_alert_sleep
    trigger_expr: v[name] and v.input_select.presence_mode == 'sleep'
    text_expr: a[name].friendly_name
    dependencies:
        - locker
    sources:
        - binary_sensor.door_attic_hatch
        - binary_sensor.door_furnace_room
        - binary_sensor.door_cellar


tracker_changes:
    class: ChangeTracker
    module: history
    entity: person.peti
    dependencies: locker


tracker_last_updated:
    module: expression
    class: Expression
    dependencies:
        - locker
        - tracker_changes
    expr: >
        int((now() - u.tracker_changes).total_seconds()) // 60
    target: sensor.tracker_last_updated
    attributes:
        unit_of_measurement: min
        icon: mdi:crosshairs-question


tracker_last_changed:
    module: expression
    class: Expression
    dependencies:
        - locker
        - tracker_changes
    expr: >
        int((now() - c.tracker_changes).total_seconds()) // 60
    target: sensor.tracker_last_changed
    attributes:
        unit_of_measurement: min


tracker_not_updated:
    module: expression
    class: Expression
    dependencies:
        - locker
        - tracker_last_updated
    expr: v.sensor.tracker_last_updated >= 180
    target: binary_sensor.tracker_not_updated


freeze_alerts:
    module: alert
    class: AlertAggregator
    target: binary_sensor.freeze_alert
    trigger_expr: >
      ok[name] and v[name] < 1.0
    text_expr: name[19:]
    dependencies:
        - locker
    sources:
        - sensor.temperature_furnace_room
        - sensor.temperature_cellar
        - sensor.temperature_bedroom_upper
        - sensor.temperature_bedroom_lower
        - sensor.temperature_living_room_upper
        - sensor.temperature_living_room_lower
        - sensor.temperature_kitchen


air_quality_alert:
    module: alert
    class: AlertAggregator
    target: binary_sensor.air_quality_alert
    trigger_expr: >
      ok.sensor.pm10_outside and
      v[name] and
      v.sensor.pm10_outside > 50
    text_expr: a[name].friendly_name
    dependencies:
        - locker
    sources:
        - binary_sensor.window_bedroom
        - binary_sensor.window_living_room
        - binary_sensor.window_entrance

