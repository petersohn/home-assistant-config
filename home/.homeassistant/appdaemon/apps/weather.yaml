rain_history:
    module: history
    class: HistoryManager
    dependencies: locker
    entity: sensor.rain
    max_interval:
        days: 10


rain_last_day:
    module: history
    class: AggregatedValue
    dependencies:
        - rain_history
        - locker
    manager: rain_history
    target: sensor.rain_last_day
    interval:
        hours: 12
    aggregator: sum
    attributes:
        unit_of_measurement: "mm"
        friendly_name: "Eső 12 óra"
        icon: mdi:weather-rainy


rain_last_hour:
    module: history
    class: AggregatedValue
    dependencies:
        - rain_history
        - locker
    manager: rain_history
    target: sensor.rain_last_hour
    interval:
        hours: 1
    aggregator: sum
    attributes:
        unit_of_measurement: "mm"
        friendly_name: "Eső 1 óra"
        icon: mdi:weather-rainy


rain_decaying:
    module: history
    class: AggregatedValue
    dependencies:
        - rain_history
        - locker
    manager: rain_history
    target: sensor.rain_decaying
    interval:
        days: 1
    fraction: 0.6
    aggregator: decay_sum
    attributes:
        unit_of_measurement: "mm"
        friendly_name: "Eső amortizált"
        icon: mdi:weather-rainy


temperature_history:
    module: history
    class: HistoryManager
    dependencies: locker
    entity: sensor.temperature_outside
    max_interval:
        days: 1


maximum_temperature_last_day:
    module: history
    class: AggregatedValue
    dependencies:
        - temperature_history
        - locker
    manager: temperature_history
    target: sensor.maximum_temperature_last_day
    interval:
        days: 1
    aggregator: max
    attributes:
        unit_of_measurement: "°C"
        friendly_name: "Maximum hőmérséklet 1 nap"
        icon: mdi:thermometer-high

