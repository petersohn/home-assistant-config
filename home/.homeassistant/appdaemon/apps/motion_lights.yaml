gate_opening:
    class: TimerSequence
    module: timer_switch
    dependencies:
        - auto_switch_light_driveway
        - auto_switch_light_gate_reflector
        - locker
    sensor: cover.gate
    target_state: opening
    sequence:
        - targets:
            - auto_switch_light_driveway
            - auto_switch_light_gate_reflector
          time: 3
    enabler: sun_enabler_night
    restart_on_trigger: true


gate_vehicle_detected:
    class: TimerSwitch
    module: timer_switch
    dependencies:
        - auto_switch_light_driveway
        - auto_switch_light_gate_reflector
        - auto_switch_light_outside_2
        - auto_switch_light_outside_3
        - auto_switch_light_outside_4
        - auto_switch_light_outside_5
        - sun_enabler_night
        - locker
    sensor: binary_sensor.kapu_vehicle_detected
    targets:
