[tool.mypy]
warn_no_return = true
disallow_untyped_defs = true
disallow_untyped_calls = true
mypy_path = [
    "test/AppDaemonUnitTest",
    "test/AppDaemonIntegrationTest/libraries",
    "test/AppDaemonIntegrationTest/config/appdaemon",
]
files = [
    "home/.homeassistant/appdaemon/apps",
    "test/AppDaemonUnitTest/apps",
    "test/AppDaemonUnitTest/libraries",
    "test/AppDaemonIntegrationTest/libraries",
    "test/AppDaemonIntegrationTest/config/appdaemon/apps/dummy.py",
    "test/AppDaemonIntegrationTest/config/appdaemon/apps/history_watcher.py",
    "test/AppDaemonIntegrationTest/config/appdaemon/apps/test_app.py",
]
exclude = [
    "robotframework-httplibrary/",
    "test/AppDaemonIntegrationTest/.appdaemon/",
    "test/AppDaemonIntegrationTest/.hass/",
    "test/AppDaemonIntegrationTest/output/",
    "test/.venv/",
]

[[tool.mypy.overrides]]
module = "apps.hass"
disable_error_code = ["valid-type"]

[tool.basedpyright]
reportAny = false
reportExplicitAny = false
reportImplicitRelativeImport = false
venvPath = "test/AppDaemonIntegrationTest/"
venv = ".appdaemon"

[tool.black]
line-length = 80
